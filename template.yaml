kind: Cluster
name: cyberhawk-talos-k8s-01
labels:
  template: true
  cni: none
  kubespan: true
kubernetes:
  version: v1.36.2
talos:
  version: v1.13.5
patches:
  - name: cni
    file: patches/cni.yml
  - name: gvisor-sysctl
    file: patches/gvisor-sysctl.yaml

features:
  enableWorkloadProxy: true
  backupConfiguration:
    interval: 6h

systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/i915-ucode
  - siderolabs/intel-ucode
  - siderolabs/iscsi-tools
  - siderolabs/gvisor
---
kind: ControlPlane
machineClass:
  name: role-controlplane
  size: 3
patches:
  - name: kubespan-enabled
    file: patches/kubespan.yml
  - name: install-cilium
    file: patches/install_cilium.yaml
  - name: install-argocd
    file: patches/install_argocd.yaml
  - name: extraManifests
    file: patches/extraManifests.yml
  - name: monitoring
    file: patches/monitoring.yaml
  - name: monitoring-controlplane
    file: patches/monitoring-controlplane.yaml
  - name: etcd-timeouts
    file: patches/etcd-timeouts.yaml
  - name: gvisor-runtime-class
    file: patches/gvisor-runtime-class.yaml
---
kind: Workers
name: blix-workers
machineClass:
  name: proxmox-auto-worker-blix
  size: 0
---
kind: Workers
name: lorenskog-workers
machineClass:
  name: role-worker-lorenskog
  size: 1
patches:
  - name: lorenskog-labels
    inline:
      machine:
        nodeLabels:
          topology.kubernetes.io/zone: lorenskog
          topology.kubernetes.io/region: onprem
  - name: kubespan-enabled
    file: patches/kubespan.yml
  - name: monitoring
    file: patches/monitoring.yaml
---
kind: Workers
name: blix-static-workers
machineClass:
  name: role-worker-blix
  size: 1
patches:
  - name: blix-labels
    inline:
      machine:
        nodeLabels:
          topology.kubernetes.io/zone: blix
          topology.kubernetes.io/region: onprem
  - name: kubespan-enabled
    file: patches/kubespan.yml
  - name: monitoring
    file: patches/monitoring.yaml
