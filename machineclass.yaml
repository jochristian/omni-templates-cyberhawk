metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: role-controlplane
spec:
  matchlabels:
    - role = control-plane
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: proxmox-auto-worker-blix
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox
    providerdata: |
      cores: 4
      memory: 4096
      disk_size: 20
      network_bridge: vmbr3
      storage_selector: name == "local-zfs"
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: role-worker-lorenskog
spec:
  matchlabels:
    - role = worker-lorenskog
