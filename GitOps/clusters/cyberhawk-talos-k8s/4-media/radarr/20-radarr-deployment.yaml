apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      nodeSelector:
        topology.cyberhawk.no/storage: files-nfs
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: radarr
          image: ghcr.io/home-operations/radarr
          env:
            - name: TZ
              value: Europe/Oslo
          ports:
            - name: http
              containerPort: 7878
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000 # matches uid 1000 ownership on the NFS export (root_squash)
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: files
              mountPath: /files
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: files
          persistentVolumeClaim:
            claimName: files
        - name: tmp
          emptyDir: {}
