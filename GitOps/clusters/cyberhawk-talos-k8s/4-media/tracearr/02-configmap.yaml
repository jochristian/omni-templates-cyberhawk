apiVersion: v1
kind: ConfigMap
metadata:
  name: tracearr-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  TZ: "Europe/Oslo"
  LOG_LEVEL: "info"
  REDIS_URL: "redis://valkey:6379"
  BACKUP_DIR: "/data/backup"
  # Behind Cilium Gateway: trust X-Forwarded-For so per-user client IPs work.
  TRUST_PROXY: "true"
  CORS_ORIGIN: "https://tracearr.cyberhawk.no"
