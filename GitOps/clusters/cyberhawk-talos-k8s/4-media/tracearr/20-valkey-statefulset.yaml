apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
spec:
  serviceName: "valkey"
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - blix
      securityContext:
        fsGroup: 999
      containers:
        - name: valkey
          image: valkey/valkey:9.1.0-alpine3.23
          # noeviction required for BullMQ job queue used by Tracearr
          command: ["valkey-server", "--maxmemory-policy", "noeviction"]
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: "RuntimeDefault"
            capabilities:
              drop:
                - "ALL"
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command: [valkey-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: valkey-data
              mountPath: /data
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: valkey-data
      spec:
        storageClassName: democratic-csi-iscsi
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
