apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tracearr
  template:
    metadata:
      labels:
        app: tracearr
    spec:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - blix
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tracearr
          image: ghcr.io/connorgallopo/tracearr:1.4.28
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: tracearr-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracearr-db-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://tracearr:$(POSTGRES_PASSWORD)@timescaledb:5432/tracearr"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: JWT_SECRET
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: COOKIE_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: tracearr-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: tracearr-data
          persistentVolumeClaim:
            claimName: tracearr-data
