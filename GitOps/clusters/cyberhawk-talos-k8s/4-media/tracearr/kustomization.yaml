apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tracearr

generators:
  - 01-secret.yaml
  - 13-timescaledb-secret.yaml
  - 60-volsync-secret.yaml

components:
  - ../../base/volsync-backup

resources:
  - 02-configmap.yaml
  - 10-timescaledb-statefulset.yaml
  - 11-timescaledb-service.yaml
  - 12-timescaledb-initdb-configmap.yaml
  - 20-valkey-statefulset.yaml
  - 21-valkey-service.yaml
  - 30-tracearr-pvc.yaml
  - 31-tracearr-deployment.yaml
  - 32-tracearr-service.yaml
  - 40-httproute.yaml
  - 50-networkpolicies.yaml

images:
  - name: ghcr.io/connorgallopo/tracearr
    newTag: "1.5.0" # renovate: docker=ghcr.io/connorgallopo/tracearr
  - name: valkey/valkey
    newTag: "9.1.0-alpine3.23" # renovate: docker=valkey/valkey
  - name: timescale/timescaledb
    newTag: "2.28.3-pg17" # renovate: docker=timescale/timescaledb

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: tracearr

patches:
  - target:
      kind: ReplicationSource
      name: backup-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: tracearr-backup
      - op: replace
        path: /spec/sourcePVC
        value: tracearr-data
      - op: replace
        path: /spec/restic/repository
        value: s3-backup-hetzner-tracearr
      - op: replace
        path: /spec/trigger/schedule
        value: "30 5 * * *"
