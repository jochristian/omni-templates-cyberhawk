apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media

generators:
  - 01-gluetun-secret.yaml
  - 02-unpackerr-secret.yaml
  - 03-volsync-secret.yaml

components:
  - ../../base/volsync-backup

resources:
  - 10-storage.yaml
  - 20-qbittorrent-deployment.yaml
  - 21-qbittorrent-service.yaml
  - 22-qbittorrent-httproute.yaml
  - 30-unpackerr-deployment.yaml
  - 50-networkpolicies.yaml

images:
  - name: qmcgaw/gluetun
    newTag: v3.41.1 # renovate: docker=qmcgaw/gluetun
  - name: ghcr.io/home-operations/qbittorrent
    newTag: "5.2.3" # renovate: docker=ghcr.io/home-operations/qbittorrent
  - name: ghcr.io/unpackerr/unpackerr
    newTag: "0.15.2" # renovate: docker=ghcr.io/unpackerr/unpackerr

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: qbittorrent

patches:
  - target:
      kind: ReplicationSource
      name: backup-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: qbittorrent-backup
      - op: replace
        path: /spec/sourcePVC
        value: qbittorrent-config
      - op: replace
        path: /spec/restic/repository
        value: s3-backup-hetzner-qbittorrent
      - op: replace
        path: /spec/trigger/schedule
        value: "15 5 * * *"
