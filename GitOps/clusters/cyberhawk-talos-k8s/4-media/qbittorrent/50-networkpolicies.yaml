# The media namespace carries allow-external-deny-internal (world + same-ns
# only). Traffic from the Cilium Gateway arrives as the "ingress" entity, which
# that policy does not cover — allow it explicitly for the WebUI.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-to-qbittorrent
spec:
  endpointSelector:
    matchLabels:
      app: qbittorrent
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# Pangolin resource (qbittorrent.cyberhawk.no) reaches the WebUI through the
# in-cluster newt tunnel client — same pattern as allow-newt-to-yamtrack.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-newt-to-qbittorrent
spec:
  endpointSelector:
    matchLabels:
      app: qbittorrent
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: newt
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
