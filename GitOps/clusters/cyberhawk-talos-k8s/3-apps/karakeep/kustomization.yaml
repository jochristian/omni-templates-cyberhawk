apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: karakeep

generators:
- 01-secret.yaml

resources:
- 10-meilisearch-pvc.yaml
- 11-meilisearch-deployment.yaml
- 12-meilisearch-service.yaml
- 20-chrome-deployment.yaml
- 21-chrome-service.yaml
- 30-karakeep-pvc.yaml
- 31-karakeep-deployment.yaml
- 32-karakeep-service.yaml

images:
- name: ghcr.io/karakeep-app/karakeep
  newTag: "0.31.0" # renovate: docker=ghcr.io/karakeep-app/karakeep
- name: getmeili/meilisearch
  newTag: "v1.41.0" # renovate: docker=getmeili/meilisearch
- name: gcr.io/zenika-hub/alpine-chrome
  newTag: "124" # renovate: docker=gcr.io/zenika-hub/alpine-chrome

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: karakeep
