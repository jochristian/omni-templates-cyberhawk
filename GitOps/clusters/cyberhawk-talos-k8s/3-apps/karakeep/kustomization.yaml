apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: karakeep

generators:
- 01-secret.yaml
- 40-volsync-secret.yaml

components:
- ../../base/volsync-backup

resources:
- 10-meilisearch-pvc.yaml
- 11-meilisearch-deployment.yaml
- 12-meilisearch-service.yaml
- 20-chrome-deployment.yaml
- 21-chrome-service.yaml
- 22-chrome-scaledobject.yaml
- 30-karakeep-pvc.yaml
- 31-karakeep-deployment.yaml
- 32-karakeep-service.yaml

images:
- name: ghcr.io/karakeep-app/karakeep
  newTag: "0.32.0" # renovate: docker=ghcr.io/karakeep-app/karakeep
- name: getmeili/meilisearch
  # v1.49+ refuses to open the v1.48 database; upgrading needs a dump/restore
  # (or wiping the PVC and letting karakeep reindex). Held back until done.
  newTag: "v1.50.0" # renovate: docker=getmeili/meilisearch
- name: gcr.io/zenika-hub/alpine-chrome
  newTag: "124" # renovate: docker=gcr.io/zenika-hub/alpine-chrome

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: karakeep

patches:
- target:
    kind: ReplicationSource
    name: backup-placeholder
  patch: |-
    - op: replace
      path: /metadata/name
      value: karakeep-backup
    - op: replace
      path: /spec/sourcePVC
      value: karakeep-data
    - op: replace
      path: /spec/restic/repository
      value: s3-backup-hetzner-karakeep
    - op: replace
      path: /spec/trigger/schedule
      value: "45 5 * * *"
