apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: geopulse

generators:
  - 01-keys-secret.yaml

resources:
  - 02-configmap.yaml
  - 10-cnpg-cluster.yaml
  - 20-backend-deployment.yaml
  - 21-backend-service.yaml
  - 30-frontend-deployment.yaml
  - 31-frontend-service.yaml
  - 40-httproute.yaml
  - 50-networkpolicies.yaml

images:
  - name: tess1o/geopulse-backend
    newTag: "1.35.0-jvm" # renovate: docker=tess1o/geopulse-backend
  - name: tess1o/geopulse-ui
    newTag: "1.35.0" # renovate: docker=tess1o/geopulse-ui

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: geopulse
