apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: geopulse-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgis:17-3.5 # renovate: docker=ghcr.io/cloudnative-pg/postgis
  inheritedMetadata:
    labels:
      app.kubernetes.io/name: geopulse
  storage:
    size: 5Gi
    storageClass: democratic-csi-iscsi
  bootstrap:
    initdb:
      database: geopulse
      owner: geopulse
      postInitTemplateSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                  - blix
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
