apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: portfolio-db
  namespace: portfolio
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: portfolio
      owner: portfolio
      secret:
        name: portfolio-db-credentials
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
