apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portfolio-api
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: portfolio-api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  egress:
    - ports:
        - port: 5432
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portfolio-web
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: portfolio-web
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: price-fetcher
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: price-fetcher
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
