apiVersion: batch/v1
kind: Job
metadata:
  name: positions-sync
  namespace: portfolio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: sync
          image: jochristian/portfolio:fetcher-latest
          command: ["python", "-m", "sync_positions"]
          env:
            - name: FETCH_MODE
              value: sync
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-app
                  key: uri
            - name: POSITIONS_FILE
              value: /config/positions.yaml
          volumeMounts:
            - name: positions
              mountPath: /config
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: positions
          configMap:
            name: positions-config
      imagePullSecrets:
        - name: dockerhub-pull
