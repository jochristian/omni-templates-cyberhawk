apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.28.0 # renovate: helm=cloudnative-pg repo=https://cloudnative-pg.github.io/charts
    releaseName: cloudnative-pg
    namespace: cnpg
    valuesInline:
      monitoring:
        podMonitorEnabled: false
