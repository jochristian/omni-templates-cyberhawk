apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mariadb-operator

helmCharts:
  - name: mariadb-operator
    repo: https://mariadb-operator.github.io/mariadb-operator
    version: 0.36.0
    releaseName: mariadb-operator
    namespace: mariadb-operator
    includeCRDs: true
    valuesInline:
      # Watch all namespaces so it manages the MariaDB CR in monitoring
      clusterWide: true

      metrics:
        enabled: false
        serviceMonitor:
          enabled: false

      # Webhook cert via self-signed — no cert-manager dependency
      webhook:
        cert:
          certManager:
            enabled: false
