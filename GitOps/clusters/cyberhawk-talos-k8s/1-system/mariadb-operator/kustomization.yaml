apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mariadb-operator

helmCharts:
  # CRDs must be installed before the operator
  - name: mariadb-operator-crds
    repo: https://helm.mariadb.com/mariadb-operator
    version: 26.3.0
    releaseName: mariadb-operator-crds
    namespace: mariadb-operator

  - name: mariadb-operator
    repo: https://helm.mariadb.com/mariadb-operator
    version: 26.3.0
    releaseName: mariadb-operator
    namespace: mariadb-operator
    valuesInline:
      # Watch all namespaces so it manages the MariaDB CR in monitoring
      currentNamespaceOnly: false

      metrics:
        enabled: false
        serviceMonitor:
          enabled: false

      # Webhook cert via self-signed — no cert-manager dependency
      webhook:
        cert:
          certManager:
            enabled: false
