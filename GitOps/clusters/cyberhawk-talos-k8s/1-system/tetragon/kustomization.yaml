apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cilium Tetragon — runtime-security OBSERVABILITY only ("learning" posture).
#
# Posture: observe-only. Tetragon streams process exec/exit, file, network and
# syscall events but performs NO enforcement. The TracingPolicies below all run in
# policy-mode "monitor" and use only the `Post` (report) action — NONE carry an
# enforcement action (Sigkill/Override/Signal), so nothing is ever blocked/killed.
# CRD-defaulted fields (maxData/resolve/returnCopy/return/syscall) are pinned in
# each policy so ArgoCD stays Synced.
#
# Namespace `tetragon` is defined (and labeled privileged) in
# 1-system/namespaces/tetragon.yaml — required because Tetragon runs privileged.

namespace: tetragon

resources:
  - 10-tracingpolicy-kernel-modules.yaml
  - 20-tracingpolicy-file-monitoring.yaml
  - 30-tracingpolicy-privileges-setuid-root.yaml

helmCharts:
  - name: tetragon
    repo: https://helm.cilium.io
    version: 1.7.0 # renovate: helm=tetragon repo=https://helm.cilium.io
    releaseName: tetragon
    namespace: tetragon
    includeCRDs: true
    valuesInline:
      # Talos v1.12.0+ requires tracefs to be mounted into the agent from the host
      # (https://tetragon.io/docs/installation/kubernetes/). Tetragon would otherwise
      # self-mount tracefs via SYS_ADMIN inside its container — which works today
      # (v1.13.4) but is the fragile path: a future Talos hardening change could break
      # kprobe attachment silently. Mount it from the host instead. hostPath == mountPath.
      extraHostPathMounts:
        - name: sys-kernel-tracing
          mountPath: /sys/kernel/tracing
          readOnly: false
      # JSON event export to a writable path. Talos has a read-only rootfs with a
      # writable /var, and this is the chart default — kept explicit for clarity.
      exportDirectory: "/var/run/cilium/tetragon"
      tetragon:
        exportFilename: tetragon.log
        # BTF auto-detect: Talos ships a BTF-enabled kernel at
        # /sys/kernel/btf/vmlinux. Empty string = let Tetragon auto-detect.
        btf: ""
        # Process visibility (exec/exit) is on by default; these enrich events.
        enableProcessCred: false
        enableProcessNs: false
        # Required for namespaced/monitor TracingPolicy selectors (chart default).
        enablePolicyFilter: true
        # Scrape agent metrics (:2112) into kube-prometheus-stack. extraLabels adds
        # the `release: monitoring` label this Prometheus' serviceMonitorSelector
        # requires (it selects all namespaces). Gives aggregate event/policy-match
        # counts (e.g. tetragon_events_total) for the Grafana dashboard.
        prometheus:
          serviceMonitor:
            enabled: true
            extraLabels:
              release: monitoring
      tetragonOperator:
        # Operator manages the TracingPolicy CRDs.
        enabled: true
        prometheus:
          serviceMonitor:
            enabled: true
            extraLabels:
              release: monitoring
