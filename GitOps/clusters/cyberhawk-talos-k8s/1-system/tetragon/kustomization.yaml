apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cilium Tetragon — runtime-security OBSERVABILITY only ("learning" posture).
#
# Posture: observe-only. Tetragon streams process exec/exit, file, network and
# syscall events but performs NO enforcement. Tetragon only enforces when a
# TracingPolicy ships an enforcement action (Sigkill/Override/Signal); we ship
# zero TracingPolicies. To audit without enforcing later, add a TracingPolicy
# with `spec.options: [{name: policy-mode, value: monitor}]`.
#
# Namespace `tetragon` is defined (and labeled privileged) in
# 1-system/namespaces/tetragon.yaml — required because Tetragon runs privileged.

namespace: tetragon

helmCharts:
  - name: tetragon
    repo: https://helm.cilium.io
    version: 1.7.0 # renovate: helm=tetragon repo=https://helm.cilium.io
    releaseName: tetragon
    namespace: tetragon
    includeCRDs: true
    valuesInline:
      # JSON event export to a writable path. Talos has a read-only rootfs with a
      # writable /var, and this is the chart default — kept explicit for clarity.
      exportDirectory: "/var/run/cilium/tetragon"
      tetragon:
        exportFilename: tetragon.log
        # BTF auto-detect: Talos ships a BTF-enabled kernel at
        # /sys/kernel/btf/vmlinux. Empty string = let Tetragon auto-detect.
        btf: ""
        # Process visibility (exec/exit) is on by default; these enrich events.
        enableProcessCred: false
        enableProcessNs: false
        # Required for namespaced/monitor TracingPolicy selectors (chart default).
        enablePolicyFilter: true
      tetragonOperator:
        # Operator manages the TracingPolicy CRDs.
        enabled: true
