apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-sensitive-files
spec:
  # policy-mode: monitor => AUDIT ONLY. Tetragon logs what would be enforced but
  # never blocks or kills. This keeps the whole install observe-only. Switching
  # this to "enforce" (or adding a Sigkill/Override/Signal matchAction below) is
  # the ONLY way Tetragon would start enforcing — intentionally not done here.
  options:
    - name: "policy-mode"
      value: "monitor"
  kprobes:
    - call: "security_file_permission"
      syscall: false
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/shadow"
                - "/etc/passwd"
          # Observation only: a Post action reports the event. There is NO
          # Sigkill/Override/Signal action, so nothing is blocked or terminated.
          matchActions:
            - action: Post
