apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

generators:
  - repo-private-secret.yaml

resources:
  - namespace.yaml
  - github.com/argoproj/argo-cd/manifests/cluster-install?ref=v3.4.5
  - appset.yaml
  - appset-private.yaml

patches:
  - path: config.yaml
  - path: params.yaml
  - path: service.yaml
  - path: argocd-repo-server-patch.yaml
    target:
      kind: Deployment
      name: argocd-repo-server
      version: v1
