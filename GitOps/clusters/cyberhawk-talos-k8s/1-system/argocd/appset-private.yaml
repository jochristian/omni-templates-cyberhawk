apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cyberhawk-private
  namespace: argocd
spec:
  goTemplate: true
  # Never cascade-delete workloads when a generated Application is removed -
  # orphan them instead (same protection as the main ApplicationSet).
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - git:
        repoURL: git@github.com:jochristian/cyberhawk-gitops-private.git
        revision: HEAD
        directories:
          # <group>/<app> -> app <group>-<app> in namespace <group>
          - path: "*/*"
          # base/ holds shared kustomize components, not standalone apps
          - path: "base/*"
            exclude: true
  template:
    metadata:
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true
      name: '{{ index (splitList "/" .path.path) 0 }}-{{ .path.basename }}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: git@github.com:jochristian/cyberhawk-gitops-private.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
      destination:
        name: in-cluster
        # Parent directory = namespace. An app whose kustomization sets its own
        # namespace overrides this per-resource; this feeds CreateNamespace and
        # the UI's destination display.
        namespace: '{{ index (splitList "/" .path.path) 0 }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
