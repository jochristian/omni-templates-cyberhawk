apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      volumes:
        - name: custom-tools
          emptyDir: {}
        - name: argocd-sops-age-key
          secret:
            secretName: argocd-sops-age-key
      initContainers:
        - name: install-ksops
          image: viaductoss/ksops:v4.5.1
          # Image is distroless from v4.4.0 onward (no shell), so the install is
          # done via the built-in `ksops install` subcommand rather than `sh -c`/mv.
          # `--with-kustomize` keeps overriding ArgoCD's bundled kustomize with the
          # KSOPS-supplied one (paired with the kustomize override mount below).
          command:
            ["/usr/local/bin/ksops", "install", "--with-kustomize", "/custom-tools"]
          # Match the hardened securityContext of the sibling containers (copyutil /
          # repo-server). runAsUser must be the numeric distroless `nonroot` uid (65532):
          # with only `runAsNonRoot: true` the kubelet refuses to start the container
          # because it can't verify a non-numeric image user. Verified the install runs
          # under a read-only rootfs as uid 65532.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
      containers:
        - name: argocd-repo-server
          env:
            - name: XDG_CONFIG_HOME
              value: /.config
            - name: SOPS_AGE_KEY_FILE
              value: /.config/sops/age/keys.txt
          volumeMounts:
            - mountPath: /usr/local/bin/kustomize
              name: custom-tools
              subPath: kustomize
            - mountPath: /usr/local/bin/ksops
              name: custom-tools
              subPath: ksops
            - mountPath: /.config/sops/age
              name: argocd-sops-age-key
