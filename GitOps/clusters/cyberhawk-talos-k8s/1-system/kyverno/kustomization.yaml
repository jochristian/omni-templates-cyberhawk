apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kyverno policy engine + policies. Best-practice policies (10/11/13)
# Enforce in the app namespaces via failureActionOverrides (Audit holdouts:
# monitoring, portfolio); PSS-restricted (12) is Audit-only, with narrow
# PolicyExceptions (20-24) for legitimately-privileged workloads.
#
# NOTE: deliberately NO top-level `namespace:` transformer here — kustomize
# treats unknown kinds as namespaced and would stamp `namespace: kyverno`
# onto the cluster-scoped ClusterPolicy resources below. The chart namespace
# is set on the helmCharts entry instead; ArgoCD's CreateNamespace=true
# creates the `kyverno` namespace.
#
# Helm hooks are disabled: under kustomize --enable-helm rendering, hook
# Jobs (pre-delete webhook cleanup, post-upgrade CRD migration) would be
# applied as plain always-present Jobs, and the chart's helm-test Pods
# (skipTests) would be applied as plain Pods running an unpinned image.
# Webhooks are cleaned up by the controller itself; CRD migrations on
# major bumps are handled out-of-band (same playbook as
# kube-prometheus-stack majors).

resources:
  - 10-policy-disallow-latest-tag.yaml
  - 11-policy-require-labels.yaml
  - 12-policy-podsecurity-restricted.yaml
  - 13-policy-restrict-image-registries.yaml
  - 20-exception-pss-node-exporter.yaml
  - 21-exception-pss-gatus.yaml
  - 22-exception-pss-librenms.yaml
  - 23-exception-pss-tautulli.yaml
  - 24-exception-pss-yamtrack.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.8.1 # renovate: helm=kyverno repo=https://kyverno.github.io/kyverno/
    releaseName: kyverno
    namespace: kyverno
    includeCRDs: true
    skipTests: true
    valuesInline:
      webhooksCleanup:
        enabled: false
      crds:
        migration:
          enabled: false
      # Break-glass: PolicyException CRs are honoured, but only from the
      # kyverno namespace — a workload namespace cannot exempt itself.
      # Runbook: docs/kyverno/break-glass.md
      features:
        policyExceptions:
          enabled: true
          namespace: kyverno
      # Homelab sizing: single replica per controller (chart default resource
      # requests/limits are already modest: 100m/64Mi req, 128Mi limit).
      # ServiceMonitors need `release: monitoring` to be selected by the
      # kube-prometheus-stack Prometheus.
      admissionController:
        replicas: 1
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring
      backgroundController:
        replicas: 1
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring
      reportsController:
        replicas: 1
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring
      cleanupController:
        replicas: 1
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring

  # Policy Reporter: UI + metrics on top of the (Cluster)PolicyReports the
  # engine above produces. UI is exposed through the Omni workload proxy
  # (50084 — next slot after Gatus 50083). The bundled Grafana dashboards
  # land in this namespace as ConfigMaps; the kps Grafana sidecar watches
  # ALL namespaces so they are auto-loaded.
  - name: policy-reporter
    repo: https://kyverno.github.io/policy-reporter
    version: 3.8.1 # renovate: helm=policy-reporter repo=https://kyverno.github.io/policy-reporter
    releaseName: policy-reporter
    namespace: kyverno
    skipTests: true
    valuesInline:
      metrics:
        enabled: true
      monitoring:
        enabled: true
        serviceMonitor:
          labels:
            release: monitoring
      resources:
        requests:
          cpu: 10m
          memory: 75Mi
        limits:
          memory: 200Mi
      ui:
        enabled: true
        service:
          annotations:
            omni-kube-service-exposer.sidero.dev/port: "50084"
            omni-kube-service-exposer.sidero.dev/label: Policy Reporter
        resources:
          requests:
            cpu: 10m
            memory: 75Mi
          limits:
            memory: 200Mi
      plugin:
        kyverno:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 75Mi
            limits:
              memory: 200Mi
