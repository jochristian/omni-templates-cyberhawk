apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment, StatefulSet
    policies.kyverno.io/description: >-
      Deployments and StatefulSets must carry the app.kubernetes.io/name
      label. Deliberately looser than the full recommended-labels set so
      pilot reports stay meaningful.
      AUDIT-ONLY, karakeep pilot — widen the namespaces match before
      promoting anywhere else (see docs/superpowers/specs/2026-07-02-kyverno-design.md).
spec:
  # Audit-only pilot: fail OPEN. With a single admission-controller replica,
  # the default failurePolicy (Fail) would block ALL pod/workload
  # create/update cluster-wide whenever the Kyverno pod is down.
  # Revisit when any rule is promoted to Enforce.
  webhookConfiguration:
    failurePolicy: Ignore
  background: true
  rules:
    - name: require-app-name-label
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
              namespaces:
                - karakeep
      validate:
        failureAction: Audit
        message: "The label app.kubernetes.io/name is required."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
