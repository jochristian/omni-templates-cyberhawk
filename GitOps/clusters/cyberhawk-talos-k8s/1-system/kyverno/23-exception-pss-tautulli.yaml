# tautulli is a linuxserver.io image: s6-overlay init must start as root and
# drops privileges itself (PUID/PGID) — runAsNonRoot can never be satisfied.
# Runs under gVisor (media namespace) which mitigates the root exposure.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: pss-tautulli
  namespace: kyverno
spec:
  exceptions:
    - policyName: podsecurity-restricted
      ruleNames:
        - restricted
        - autogen-restricted
  match:
    any:
      - resources:
          kinds:
            - Pod
            - Deployment
            - ReplicaSet
          namespaces:
            - media
          names:
            - tautulli*
  podSecurity:
    - controlName: Running as Non-root
    - controlName: Running as Non-root
      images:
        - lscr.io/linuxserver/tautulli*
    - controlName: Capabilities
      images:
        - lscr.io/linuxserver/tautulli*
