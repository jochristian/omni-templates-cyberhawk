apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Images may only be pulled from the registries this cluster actually
      uses: docker.io, ghcr.io, quay.io, lscr.io, gcr.io. Catches typosquats
      and manifests pulling from unexpected sources. image_normalize()
      canonicalises bare image names (e.g. "corentinth/it-tools" ->
      "docker.io/corentinth/it-tools") so implicit Docker Hub images pass.
      Scope: Audit across the GitOps-managed namespaces (declared in
      1-system/namespaces/, minus infrastructure: tetragon/kyverno/keda),
      ENFORCE in karakeep. Promote namespaces by adding them to
      failureActionOverrides. Break-glass: docs/kyverno/break-glass.md.
spec:
  # Fail OPEN (best-effort enforcement): with a single admission-controller
  # replica, the default failurePolicy (Fail) would block ALL pod/workload
  # create/update cluster-wide whenever the Kyverno pod is down. Accepted
  # trade-off: a down Kyverno briefly lets violations into Enforce namespaces.
  # If hard guarantees are ever needed: failurePolicy Fail + >=2 replicas.
  webhookConfiguration:
    failurePolicy: Ignore
  background: true
  rules:
    - name: validate-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Namespaces declared in 1-system/namespaces/ minus
              # infrastructure (tetragon, kyverno, keda) — keep in sync.
              namespaces:
                - cert-manager
                - development
                - it-tools
                - karakeep
                - media
                - monitoring
                - newt
                - openbao
                - portfolio
                - production
                - tracearr
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - karakeep
        message: >-
          Image is not from an approved registry
          (docker.io, ghcr.io, quay.io, lscr.io, gcr.io).
        foreach:
          - list: "request.object.spec.[ephemeralContainers, initContainers, containers][]"
            deny:
              conditions:
                all:
                  - key: "{{ image_normalize(element.image) }}"
                    operator: AnyNotIn
                    value:
                      - "docker.io/*"
                      - "ghcr.io/*"
                      - "quay.io/*"
                      - "lscr.io/*"
                      - "gcr.io/*"
