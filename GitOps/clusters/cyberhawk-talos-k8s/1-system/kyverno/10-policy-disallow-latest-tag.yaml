apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      The ':latest' tag is mutable and can lead to unexpected errors if the
      image changes. This policy validates that every container image
      specifies a tag and that the tag is not 'latest'.
      Scope: GitOps-managed namespaces (declared in 1-system/namespaces/,
      minus infrastructure: tetragon/kyverno/keda). ENFORCE everywhere
      except monitoring (held in Audit so ad-hoc debug pods aren't blocked)
      and portfolio (app disabled, never audited). Promote namespaces by
      adding them to failureActionOverrides. Break-glass:
      docs/kyverno/break-glass.md.
spec:
  # Fail OPEN (best-effort enforcement): with a single admission-controller
  # replica, the default failurePolicy (Fail) would block ALL pod/workload
  # create/update cluster-wide whenever the Kyverno pod is down. Accepted
  # trade-off: a down Kyverno briefly lets violations into Enforce namespaces.
  # If hard guarantees are ever needed: failurePolicy Fail + >=2 replicas.
  webhookConfiguration:
    failurePolicy: Ignore
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Namespaces declared in 1-system/namespaces/ minus
              # infrastructure (tetragon, kyverno, keda) — keep in sync.
              namespaces:
                - cert-manager
                - development
                - dnscontrol
                - geopulse
                - it-tools
                - karakeep
                - monitoring
                - newt
                - openbao
                - portfolio
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - cert-manager
              - development
              - dnscontrol
              - geopulse
              - it-tools
              - karakeep
              - newt
              - openbao
              - production
        message: "An image tag is required."
        pattern:
          spec:
            containers:
              - image: "*:*"
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Namespaces declared in 1-system/namespaces/ minus
              # infrastructure (tetragon, kyverno, keda) — keep in sync.
              namespaces:
                - cert-manager
                - development
                - dnscontrol
                - geopulse
                - it-tools
                - karakeep
                - monitoring
                - newt
                - openbao
                - portfolio
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - cert-manager
              - development
              - dnscontrol
              - geopulse
              - it-tools
              - karakeep
              - newt
              - openbao
              - production
        message: "Using a mutable image tag e.g. 'latest' is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
