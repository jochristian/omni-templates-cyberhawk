apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    # Kyverno needs NO privilege (unlike tetragon): plain userspace controllers,
    # non-root, all capabilities dropped, seccomp RuntimeDefault. That makes it
    # fully "restricted"-compliant, so enforce the strictest PSS level rather
    # than inheriting Talos's baseline default.
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/enforce: restricted
