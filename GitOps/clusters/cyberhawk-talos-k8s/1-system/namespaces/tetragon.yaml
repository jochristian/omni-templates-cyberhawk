apiVersion: v1
kind: Namespace
metadata:
  name: tetragon
  labels:
    # Tetragon runs privileged (eBPF, hostPath, host PID). On Talos the PodSecurity
    # admission controller rejects the DaemonSet unless the namespace is privileged.
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/enforce: privileged
