apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

generators:
  - secret-generator.yaml

helmCharts:
  - name: democratic-csi
    repo: https://democratic-csi.github.io/charts/
    version: 0.15.1
    releaseName: democratic-csi-iscsi
    namespace: kube-system
    valuesInline:
      csiDriver:
        name: "org.democratic-csi.iscsi"

      storageClasses:
        - name: democratic-csi-iscsi
          defaultClass: false
          reclaimPolicy: Retain          # Retain on PVC delete — safe default for DB storage
          volumeBindingMode: Immediate
          allowVolumeExpansion: true
          parameters:
            fsType: ext4
          mountOptions: []

      volumeSnapshotClasses: []

      driver:
        # Secret is managed by KSOPS — chart must not create its own
        existingConfigSecret: democratic-csi-driver-config
        # driver.config.driver must be set here so the chart picks the correct
        # mount/unmount helpers — the actual sensitive config lives in the secret above
        config:
          driver: freenas-api-iscsi
        # Pin to next tag — supports TrueNAS 25.10+, required until a stable release
        # ships with WebSocket/JSON-RPC support (REST API removed in TrueNAS 26.04)
        # Ref: https://github.com/democratic-csi/democratic-csi/issues/509
        image:
          tag: next

      node:
        hostPID: true                    # Required for nsenter on Talos
        # Control-plane nodes carry the iscsi-tools extension too; the node
        # driver must run there so PVCs mount for pods that tolerate the CP
        # taint (openbao-1 raft member on ctrl-02).
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        driver:
          extraEnv:
            - name: ISCSIADM_HOST_STRATEGY
              value: nsenter
            - name: ISCSIADM_HOST_PATH
              value: /usr/local/sbin/iscsiadm   # Path provided by siderolabs/iscsi-tools extension
          # Talos iscsi-tools v0.2.0+ uses /var/iscsi (Talos 1.10+ removed /etc/iscsi and /usr/local/etc/iscsi)
          # type "" skips the kubelet hostPath check which rejects bind mounts as "not a directory"
          iscsiDirHostPath: /var/iscsi
          iscsiDirHostPathType: ""
        # Only schedule on nodes where the iscsi-tools extension is active
        # Extension label appears after node reboots with the extension installed
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: extensions.talos.dev/iscsi-tools
                      operator: Exists

  - name: democratic-csi
    repo: https://democratic-csi.github.io/charts/
    version: 0.15.1
    releaseName: democratic-csi-iscsi-files
    namespace: kube-system
    valuesInline:
      csiDriver:
        name: "org.democratic-csi.iscsi-files"

      storageClasses:
        - name: democratic-csi-iscsi-files
          defaultClass: false
          reclaimPolicy: Retain
          volumeBindingMode: Immediate
          allowVolumeExpansion: true
          parameters:
            fsType: ext4
          mountOptions: []

      volumeSnapshotClasses: []

      driver:
        existingConfigSecret: democratic-csi-files-config
        config:
          driver: freenas-api-iscsi
        image:
          tag: next

      node:
        hostPID: true
        driver:
          extraEnv:
            - name: ISCSIADM_HOST_STRATEGY
              value: nsenter
            - name: ISCSIADM_HOST_PATH
              value: /usr/local/sbin/iscsiadm
          iscsiDirHostPath: /var/iscsi
          iscsiDirHostPathType: ""
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: extensions.talos.dev/iscsi-tools
                      operator: Exists
