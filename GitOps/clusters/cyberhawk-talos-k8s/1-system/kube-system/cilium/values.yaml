cilium:
  mtu: 1450
  kubeProxyReplacement: true
  # Talos specific
  k8sServiceHost: localhost
  k8sServicePort: 7445
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETUID
        - SETGID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup

  cni:
    exclusive: false

  # https://docs.cilium.io/en/stable/network/concepts/ipam/
  ipam:
    mode: kubernetes

  encryption:
    enabled: false
    type: ""

  nodePort:
    enabled: true

  forceDeviceDetection: true

    #debug:
  #  enabled: true

  l2announcements:
    enabled: false

  bpf:
    masquerade: true

  externalIPs:
    enabled: true

  devices: "eth0"
  routingMode: tunnel
  autoDirectNodeRoutes: false
  ipv4NativeRoutingCIDR: "10.0.0.0/8"
  tunnelProtocol: vxlan

  forwardKubeDNSToHost: false

  bgpControlPlane:
    enabled: true

  loadBalancer:
    # https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/#maglev-consistent-hashing
    algorithm: maglev

  gatewayAPI:
    enabled: true

  envoy:
    securityContext:
      capabilities:
        keepCapNetBindService: true
        envoy: [ NET_ADMIN, PERFMON, BPF ]

  ingressController:
    enabled: true
    default: true
    loadbalancerMode: dedicated
    service:
      type: LoadBalancer
      allocateLoadBalancerNodePorts: false
      annotations:
        io.cilium/lb-ipam-ips: 10.50.2.1

  prometheus:
    enabled: true
    serviceMonitor:
        enabled: false

  # Enable Hubble
  hubble:
      relay:
        enabled: true
      ui:
        enabled: true
        service:
          annotations:
            # Enable Omni Workload Proxying for this service
            omni-kube-service-exposer.sidero.dev/port: "50080"
            omni-kube-service-exposer.sidero.dev/label: Hubble
