apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openbao

generators:
  - ksops-generator.yaml

resources:
  - serviceaccount-auth.yaml
  - clusterrolebinding-auth.yaml

helmCharts:
  - name: openbao
    repo: https://openbao.github.io/openbao-helm
    version: 0.28.2
    releaseName: openbao
    namespace: openbao
    valuesFile: openbao-values.yaml
