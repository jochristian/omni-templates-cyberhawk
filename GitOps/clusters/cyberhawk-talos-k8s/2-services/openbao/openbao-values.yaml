global:
  enabled: true
  tlsDisable: true

server:
  image:
    registry: "quay.io"
    repository: "openbao/openbao"
    tag: ""

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/openbao/data"
        }

        # Auto-unseal — key delivered via SOPS-managed secret
        # (openbao-static-unseal). Shamir keys remain as recovery keys.
        seal "static" {
          current_key_id = "static-key-1"
          current_key    = "env://BAO_STATIC_UNSEAL_KEY"
        }

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  securityContext:
    capabilities:
      add:
        - IPC_LOCK

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: democratic-csi-iscsi

  auditStorage:
    enabled: true
    size: 5Gi
    storageClass: democratic-csi-iscsi

  extraSecretEnvironmentVars:
    - envName: BAO_STATIC_UNSEAL_KEY
      secretName: openbao-static-unseal
      secretKey: BAO_STATIC_UNSEAL_KEY

  serviceAccount:
    create: true
    name: openbao

injector:
  enabled: true
  replicas: 1

ui:
  enabled: true
  serviceType: ClusterIP
