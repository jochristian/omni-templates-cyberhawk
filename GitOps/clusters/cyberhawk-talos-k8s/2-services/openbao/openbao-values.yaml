global:
  enabled: true
  tlsDisable: true

server:
  image:
    registry: "quay.io"
    repository: "openbao/openbao"
    tag: ""

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/openbao/data"
        }

        # Auto-unseal — key delivered via SOPS-managed secret
        # (openbao-static-unseal). Shamir keys remain as recovery keys.
        seal "static" {
          current_key_id = "static-key-1"
          current_key    = "env://BAO_STATIC_UNSEAL_KEY"
        }

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # PSS restricted compliance. The chart's pod-level defaults (runAsNonRoot,
  # uid 100, seccompProfile RuntimeDefault) already apply; the container
  # context replaces the chart default, so allowPrivilegeEscalation must be
  # restated. NOTE: an earlier `server.securityContext.capabilities.add:
  # IPC_LOCK` block sat here for a while — that key does not exist in the
  # openbao chart and was silently ignored (verified live), so OpenBao has
  # always run without IPC_LOCK/mlock.
  statefulSet:
    securityContext:
      container:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: democratic-csi-iscsi

  auditStorage:
    enabled: true
    size: 5Gi
    storageClass: democratic-csi-iscsi

  extraSecretEnvironmentVars:
    - envName: BAO_STATIC_UNSEAL_KEY
      secretName: openbao-static-unseal
      secretKey: BAO_STATIC_UNSEAL_KEY

  serviceAccount:
    create: true
    name: openbao

injector:
  enabled: true
  replicas: 1

ui:
  enabled: true
  serviceType: ClusterIP
