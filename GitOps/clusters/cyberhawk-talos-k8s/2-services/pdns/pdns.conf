# Hidden primary for the internal view of cyberhawk.no. Never queried by
# clients directly — the routers' secondaries AXFR from here and serve the LAN.
launch=lmdb
lmdb-filename=/var/lib/powerdns/pdns.lmdb
# Non-root (uid 953) can't bind :53 — the Service maps 53 -> 5300.
local-address=0.0.0.0
local-port=5300
socket-dir=/var/lib/powerdns
primary=yes
# Secondaries: OPNsense (blix, 10.50.1.1) and the VyOS pdns-sec container
# (lorenskog, 192.168.254.253 on the VyOS CONTAINERS network). Node subnets
# and the pod CIDR included because LB traffic entering on a node that doesn't
# host the pod gets SNATed by Cilium to a pod-network IP (observed: OPNsense
# AXFR arrived as 10.244.x). The zone is not secret; this is fine.
allow-axfr-ips=10.50.1.0/24,192.168.155.0/24,192.168.254.0/24,10.244.0.0/16
# Best-effort fast propagation to the VyOS secondary; SOA refresh (300s) is
# the guaranteed path for both sites. No entry for OPNsense BIND: it listens
# on a custom port and refuses NOTIFY from SNATed node IPs anyway.
also-notify=192.168.254.253
# serial refresh retry expire minimum — expire 14d keeps the secondaries
# serving through any realistic cluster outage.
default-soa-content=ns1.cyberhawk.no hostmaster.@ 0 300 120 1209600 300
security-poll-suffix=
# The image startup wrapper drops the API/webserver config (from
# PDNS_AUTH_API_KEY) into this dir.
include-dir=/etc/powerdns/pdns.d
