apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pdns

generators:
  - 01-secret.yaml

resources:
  - 10-storage.yaml
  - 20-deployment.yaml
  - 21-service.yaml
  - 50-networkpolicies.yaml

# Hash-suffixed so config edits roll the pod.
configMapGenerator:
  - name: pdns-conf
    files:
      - pdns.conf

# NOTE: PowerDNS ships one Docker repo per minor (pdns-auth-51, -52, …), so
# renovate only sees patch bumps — major/minor upgrades need a manual image
# rename here and in 20-deployment.yaml.
images:
  - name: powerdns/pdns-auth-51
    newTag: "5.1.3" # renovate: docker=powerdns/pdns-auth-51

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: pdns
