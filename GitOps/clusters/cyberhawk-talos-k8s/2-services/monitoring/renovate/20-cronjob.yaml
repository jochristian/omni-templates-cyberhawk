apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  # Nightly, off-peak (Oslo). Renovate's own prHourlyLimit/schedule throttle PR churn.
  schedule: "0 2 * * *"
  timeZone: Europe/Oslo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              image: renovate/renovate
              env:
                # Bot config (platform/repos/onboarding) from the ConfigMap.
                - name: RENOVATE_CONFIG_FILE
                  value: /etc/renovate/config.json
                # readOnlyRootFilesystem: keep all writes (git clone, cache, git config)
                # on the /tmp emptyDir.
                - name: RENOVATE_BASE_DIR
                  value: /tmp/renovate
                - name: HOME
                  value: /tmp
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secret
                      key: RENOVATE_TOKEN
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: config
                  mountPath: /etc/renovate
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: tmp
              emptyDir: {}
