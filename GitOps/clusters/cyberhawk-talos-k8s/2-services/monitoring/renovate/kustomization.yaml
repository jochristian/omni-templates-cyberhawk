apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generators:
  - 01-secret.yaml

resources:
  - 10-configmap.yaml
  - 20-cronjob.yaml

images:
  # Renovate self-hosted runner. Renovate updates THIS tag via PR too (see the
  # annotation, decoded by the customManager in the repo-root renovate.json).
  - name: renovate/renovate
    newTag: "43.239.0" # renovate: docker=renovate/renovate

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: renovate
