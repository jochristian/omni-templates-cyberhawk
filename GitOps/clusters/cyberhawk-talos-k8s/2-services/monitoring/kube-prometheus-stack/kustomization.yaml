apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 86.2.3
    releaseName: monitoring
    namespace: monitoring
    includeCRDs: true
    valuesInline:
      kubeEtcd:
        enabled: true
        endpoints:
          - 10.50.1.50
          - 10.50.1.51
          - 10.50.1.52
        service:
          enabled: true
          port: 2381
          targetPort: 2381
      kubeControllerManager:
        service:
          selector:
            k8s-app: kube-controller-manager
      kubeScheduler:
        service:
          selector:
            k8s-app: kube-scheduler
      alertmanager:
        alertmanagerSpec:
          storage:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 10Gi
      prometheus:
        prometheusSpec:
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 40Gi
      grafana:
        grafana.ini:
          auth:
            disable_login_form: true
            disable_signout_menu: true
          auth.basic:
            enabled: false
          auth.anonymous:
            enabled: true
        # NOTE: the chart already provisions the Prometheus datasource (uid
        # "prometheus", isDefault, timeInterval "30s"). Do NOT redeclare it here —
        # a duplicate uid with a numeric timeInterval made Grafana reject every
        # Prometheus query ("the field 'timeInterval' should be a string"), which
        # showed up as "No data" on all dashboards.
        additionalDataSources:
          # Loki (2-services/monitoring/loki) — durable store for Tetragon
          # runtime-security events shipped by Alloy. Query e.g.
          # {job="tetragon"} |= "process_kprobe" for policy matches.
          - name: Loki
            type: loki
            uid: loki
            access: proxy
            url: http://loki.monitoring.svc.cluster.local:3100
        service:
          annotations:
            omni-kube-service-exposer.sidero.dev/port: "50082"
            omni-kube-service-exposer.sidero.dev/label: Grafana