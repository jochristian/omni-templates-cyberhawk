apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NB: no top-level `namespace:` transformer. The Helm release already stamps every
# resource with its correct namespace (monitoring for the stack; kube-system for the
# kube-controller-manager/scheduler/etcd/coredns/kube-proxy exporter Services, which
# MUST live in kube-system to select those component pods). A blanket
# `namespace: monitoring` rewrites those exporter Services into monitoring, leaving
# them with no endpoints — which made the CoreDNS/controller-manager/scheduler/etcd
# dashboards show "No data".

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 87.17.0
    releaseName: monitoring
    namespace: monitoring
    includeCRDs: true
    valuesInline:
      kubeEtcd:
        enabled: true
        endpoints:
          - 10.50.1.50
          - 10.50.1.51
          - 192.168.155.10
        service:
          enabled: true
          port: 2381
          targetPort: 2381
      kubeControllerManager:
        service:
          selector:
            k8s-app: kube-controller-manager
      kubeScheduler:
        service:
          selector:
            k8s-app: kube-scheduler
      alertmanager:
        alertmanagerSpec:
          storage:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 10Gi
      prometheus:
        prometheusSpec:
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 40Gi
          # etcd runs as a Talos service (not a pod), exposing plaintext metrics on
          # the control-plane node IPs at :2381. The kubeEtcd exporter scrapes it via
          # a selectorless Service + a manual Endpoints object — but ArgoCD excludes
          # Endpoints/EndpointSlice from management, so that object is never created
          # and the etcd target stays down. Scrape it directly with a static config
          # instead (job "kube-etcd" matches the chart's etcd dashboard + alert rules).
          additionalScrapeConfigs:
            - job_name: kube-etcd
              scheme: http
              static_configs:
                - targets:
                    - 10.50.1.50:2381
                    - 10.50.1.51:2381
                    - 192.168.155.10:2381
      grafana:
        grafana.ini:
          auth:
            disable_login_form: true
            disable_signout_menu: true
          auth.basic:
            enabled: false
          auth.anonymous:
            enabled: true
        # NOTE: the chart already provisions the Prometheus datasource (uid
        # "prometheus", isDefault, timeInterval "30s"). Do NOT redeclare it here —
        # a duplicate uid with a numeric timeInterval made Grafana reject every
        # Prometheus query ("the field 'timeInterval' should be a string"), which
        # showed up as "No data" on all dashboards.
        additionalDataSources:
          # Loki (2-services/monitoring/loki) — durable store for Tetragon
          # runtime-security events shipped by Alloy. Query e.g.
          # {job="tetragon"} |= "process_kprobe" for policy matches.
          - name: Loki
            type: loki
            uid: loki
            access: proxy
            url: http://loki.monitoring.svc.cluster.local:3100
        service:
          annotations:
            omni-kube-service-exposer.sidero.dev/port: "50082"
            omni-kube-service-exposer.sidero.dev/label: Grafana