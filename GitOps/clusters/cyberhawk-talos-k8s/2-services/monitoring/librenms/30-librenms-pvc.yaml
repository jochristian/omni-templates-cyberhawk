apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: nfs.csi.k8s.io
  name: librenms-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-csi
  mountOptions:
    - nfsvers=4.1
  nfs:
    path: /files/kubernetes_csi/librenms-data
    server: 10.50.1.200

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: librenms-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: librenms-data
  storageClassName: nfs-csi
