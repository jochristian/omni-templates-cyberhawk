apiVersion: apps/v1
kind: Deployment
metadata:
  name: librenms-dispatcher
spec:
  replicas: 1
  # Recreate (not RollingUpdate) so a fixed DISPATCHER_NODE_ID is never held by
  # two pods at once during a rollout (they share one poller_cluster row).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: librenms
      component: dispatcher
  template:
    metadata:
      labels:
        app: librenms
        component: dispatcher
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dispatcher
          image: librenms/librenms
          envFrom:
            - configMapRef:
                name: librenms-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librenms-secret
                  key: DB_PASSWORD
            # Stable, NOT the pod name: a per-pod name leaves an orphan
            # poller_cluster row on every rollout (breaks validate.php).
            - name: DISPATCHER_NODE_ID
              value: librenms-dispatcher
            - name: SIDECAR_DISPATCHER
              value: "1"
          securityContext:
            capabilities:
              add: [NET_ADMIN, NET_RAW]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: librenms-data
