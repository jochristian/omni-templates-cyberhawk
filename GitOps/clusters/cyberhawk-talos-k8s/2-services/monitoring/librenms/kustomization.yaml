apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generators:
  - 01-secret.yaml
  - 60-volsync-secret.yaml

components:
  - ../../../base/volsync-backup

resources:
  - 02-configmap.yaml
  - 10-mariadb.yaml            # MariaDB CR — managed by mariadb-operator
  - 11-mariadb-database.yaml  # Database, User, Grant CRs
  - 20-valkey-deployment.yaml
  - 21-valkey-service.yaml
  - 22-rrdcached-deployment.yaml
  - 23-rrdcached-service.yaml
  - 30-librenms-pvc.yaml
  - 31-librenms-deployment.yaml
  - 32-librenms-service.yaml
  - 33-librenms-dispatcher-deployment.yaml
  - 34-librenms-snmp-scan-cronjob.yaml


images:
  - name: librenms/librenms
    newTag: "26.6.1"
  - name: valkey/valkey
    newTag: "9.1-alpine"
  - name: crazymax/rrdcached
    newTag: "1.9.0-r4"

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: librenms

patches:
  - target:
      kind: ReplicationSource
      name: backup-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: librenms-backup
      - op: replace
        path: /spec/sourcePVC
        value: librenms-data
      - op: replace
        path: /spec/restic/repository
        value: s3-backup-hetzner-librenms
      - op: replace
        path: /spec/trigger/schedule
        value: "15 6 * * *"
