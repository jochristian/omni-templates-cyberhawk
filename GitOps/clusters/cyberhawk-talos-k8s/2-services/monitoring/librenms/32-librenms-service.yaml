apiVersion: v1
kind: Service
metadata:
  name: librenms
spec:
  # Accessed via Pangolin/newt (in-cluster), not the Omni workload proxy.
  # The omni-kube-service-exposer annotations were removed: their per-node
  # L4 health checks spammed nginx with "client closed connection" at info.
  type: ClusterIP
  selector:
    app: librenms
    component: web
  ports:
    - name: http
      port: 80
      targetPort: 8000
