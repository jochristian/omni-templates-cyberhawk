apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: grafana-dashboard-argocd
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - argocd.json

  - name: grafana-dashboard-cilium-agent
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - cilium-agent.json

  - name: grafana-dashboard-cert-manager
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - cert-manager.json
