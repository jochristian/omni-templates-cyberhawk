apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dnscontrol

generators:
  - 01-dnscontrol.yaml

resources:
  - 10-push-job.yaml
  - 20-drift-cronjob.yaml

images:
  - name: ghcr.io/dnscontrol/dnscontrol
    newTag: "4.43.3" # renovate: docker=ghcr.io/dnscontrol/dnscontrol

# includeSelectors must stay false: kustomize would inject the label into
# Job spec.selector, which the job controller manages (immutable/auto-set).
labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: dnscontrol
